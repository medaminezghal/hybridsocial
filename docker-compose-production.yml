# HybridSocial Production Deployment
# Usage:
#   1. Copy .env.production.example to .env and fill in your values
#   2. sh docker/generate-secrets.sh .env   (auto-generates SECRET_KEY_BASE + instance keys)
#   3. docker compose -f docker-compose-production.yml up -d
#
# First-time setup:
#   docker compose -f docker-compose-production.yml exec backend bin/hybridsocial eval "Hybridsocial.Release.setup()"

services:
  # ---- Infrastructure ----

  postgresql:
    image: postgres:17-alpine
    container_name: hs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hybridsocial}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-hybridsocial_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hybridsocial} -d ${DB_NAME:-hybridsocial_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  valkey:
    image: valkey/valkey:8-alpine
    container_name: hs_valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--requirepass", "${VALKEY_PASSWORD:-}"]
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nats:
    image: nats:2-alpine
    container_name: hs_nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: hs_search
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - searchdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'opensearch'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ---- Application ----

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: hs_migrate
    environment:
      DATABASE_URL: "ecto://${DB_USER:-hybridsocial}:${DB_PASSWORD:?}@postgresql/${DB_NAME:-hybridsocial_prod}"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Run 'sh docker/generate-secrets.sh .env' first}
      VALKEY_URL: "redis://:${VALKEY_PASSWORD:-}@valkey:6379"
      NATS_URL: "nats://nats:4222"
      OPENSEARCH_URL: "http://opensearch:9200"
    command: ["eval", "Hybridsocial.Release.migrate()"]
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: hs_backend
    restart: unless-stopped
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      postgresql:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      PHX_SERVER: "true"
      PORT: "4000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "ecto://${DB_USER:-hybridsocial}:${DB_PASSWORD:?}@postgresql/${DB_NAME:-hybridsocial_prod}"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Run 'sh docker/generate-secrets.sh .env' first}
      # At-rest encryption master keys. Without these the app crashes on
      # the first DM (message crypto) and the first write that encrypts a
      # private key / 2FA secret / email. Generate with `openssl rand -base64 32`.
      # LOSING EITHER MAKES THE CORRESPONDING DATA UNRECOVERABLE — back them up.
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:?Set MESSAGE_ENCRYPTION_KEY in .env}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?Set DATA_ENCRYPTION_KEY in .env}
      PHX_HOST: ${DOMAIN:?Set DOMAIN in .env}
      VALKEY_URL: "redis://:${VALKEY_PASSWORD:-}@valkey:6379"
      NATS_URL: "nats://nats:4222"
      OPENSEARCH_URL: "http://opensearch:9200"
      POOL_SIZE: ${POOL_SIZE:-10}
      UPLOADS_DIR: /app/uploads
      # Email — Resend API (preferred) is checked first, then SMTP.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@${DOMAIN}}
      # Media domain — separate origin for user uploads (security)
      MEDIA_HOST: ${MEDIA_HOST:-}
      # S3 (optional)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      # Instance actor keys (for federation signing)
      INSTANCE_PUBLIC_KEY: ${INSTANCE_PUBLIC_KEY:-}
      INSTANCE_PRIVATE_KEY: ${INSTANCE_PRIVATE_KEY:-}
      # ClamAV scanning is configured via the admin panel (DB-backed):
      # set clamav_enabled=true once the clamav service is healthy.
      # Defaults route to the in-network clamav:3310 service.
    volumes:
      - uploads:/app/uploads
    networks:
      - internal
    # Bind to loopback only. Caddy reaches the API over the internal
    # network (backend:4000), so publishing to 0.0.0.0 would only let
    # clients hit the API directly and bypass the Caddy/Coraza WAF.
    ports:
      - "127.0.0.1:4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: hs_frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      ORIGIN: "https://${DOMAIN:?}"
      PROTOCOL_HEADER: "x-forwarded-proto"
      HOST_HEADER: "x-forwarded-host"
      ADDRESS_HEADER: "x-forwarded-for"
      XFF_DEPTH: "1"
    depends_on:
      - backend
    networks:
      - internal
    # Loopback only — Caddy proxies to frontend:3000 over the internal
    # network; a public bind would just expose the app in front of the WAF.
    ports:
      - "127.0.0.1:3000:3000"

  # ---- Antivirus (scans media uploads before storage) ----

  clamav:
    image: clamav/clamav:1.4
    container_name: hs_clamav
    restart: unless-stopped
    environment:
      # Disable freshclam scheduling inside the container; the image
      # runs an initial signature pull on first start (~5 min). For
      # ongoing updates, rely on the cron in clamav/clamav.
      CLAMAV_NO_FRESHCLAMD: "false"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s
    networks:
      - internal

  # ---- Reverse Proxy + WAF ----

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: hs_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      MEDIA_DOMAIN: ${MEDIA_DOMAIN:-}
      CROWDSEC_BOUNCER_CADDY_KEY: ${CROWDSEC_BOUNCER_CADDY_KEY:?Run 'sh docker/generate-secrets.sh .env' first}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      crowdsec:
        condition: service_healthy
    networks:
      - internal

  # ---- Behavioral IP filtering ----

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: hs_crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: "crowdsecurity/caddy crowdsecurity/http-cve crowdsecurity/base-http-scenarios crowdsecurity/linux"
      # Pre-register the bouncer key on first boot so Caddy can
      # authenticate immediately (no manual `cscli bouncers add`).
      BOUNCER_KEY_caddy: ${CROWDSEC_BOUNCER_CADDY_KEY:?Run 'sh docker/generate-secrets.sh .env' first}
      # Email notifier reuses the app's SMTP config.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@${DOMAIN}}
      CROWDSEC_NOTIFY_EMAIL_TO: ${CROWDSEC_NOTIFY_EMAIL_TO:-}
    volumes:
      - caddy_logs:/var/log/caddy:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro,z
      - ./crowdsec/profiles.yaml:/etc/crowdsec/profiles.yaml:ro,z
      # Email digest notifier — disabled until SMTP is configured. The
      # plugin broker loads every file in notifications/, so an unwired
      # (templated) config crashes crowdsec at boot. Re-add this mount +
      # the profiles.yaml notifications block once SMTP_* are set.
      # - ./crowdsec/notifications/email.yaml:/etc/crowdsec/notifications/email.yaml:ro,z
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - internal

volumes:
  pgdata:
  valkeydata:
  natsdata:
  searchdata:
  uploads:
  caddy_data:
  caddy_config:
  caddy_logs:
  clamav_data:
  crowdsec_data:
  crowdsec_config:

networks:
  internal:
    driver: bridge
