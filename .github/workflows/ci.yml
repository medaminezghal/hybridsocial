name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "28"

jobs:
  build-and-check:
    name: Build & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('backend/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo (strict)
        run: mix credo --strict

  i18n:
    name: i18n Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check translation files
        working-directory: frontend/
        run: node scripts/check-i18n.mjs

  test:
    name: Test (partition ${{ matrix.partition }})
    runs-on: ubuntu-latest
    needs: build-and-check
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
    defaults:
      run:
        working-directory: backend/

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: hybridsocial
          POSTGRES_PASSWORD: hybridsocial_dev
          POSTGRES_DB: hybridsocial_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Each partition gets its own database (hybridsocial_test1..4) via the
      # MIX_TEST_PARTITION suffix baked into config/test.exs.
      MIX_TEST_PARTITION: ${{ matrix.partition }}
      DATABASE_URL: ecto://hybridsocial:hybridsocial_dev@localhost/hybridsocial_test${{ matrix.partition }}
      VALKEY_URL: redis://localhost:6379/1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('backend/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Create database
        run: mix ecto.create

      - name: Run migrations
        run: mix ecto.migrate

      - name: Run tests
        # --partitions splits the suite into 4 buckets; MIX_TEST_PARTITION
        # (set per matrix job) selects which bucket this runner executes.
        run: mix test --partitions 4

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: build-and-check
    defaults:
      run:
        working-directory: backend/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('backend/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Audit dependencies
        run: mix deps.audit

      - name: Run Sobelow
        run: mix sobelow --config

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: backend/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend/
          push: false
          tags: |
            hybridsocial-backend:${{ github.sha }}
            hybridsocial-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
